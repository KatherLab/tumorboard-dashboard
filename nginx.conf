server {
    server_name arena.kather.ai;
    root /home/robot/projects/arena/dist;
    index index.html;

    # Block dotfiles (.git, .env, .gitignore, etc.)
    location ~ /\. {
        return 404;
    }

    # Block internal file types
    location ~* \.(py|sh|md|env|yml|yaml|toml|lock|log|sql|bak|conf|tmp|ts|jsx|tsx|vue|map)$ {
        return 404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/arena.kather.ai/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/arena.kather.ai/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = arena.kather.ai) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name arena.kather.ai;
    return 404; # managed by Certbot


}
